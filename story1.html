<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="story-title">История</title>

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">

    <!-- Подключение стилей -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/mobile.css" media="only screen and (max-width: 768px)">
    <link rel="stylesheet" href="css/share.css">

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4048193958934146"
        crossorigin="anonymous"></script>

    <!-- Подключение JavaScript файлов -->
    <script async src="js/gtag.js"></script>
    <script async src="js/seo.js"></script>
    <script async src="js/redirect.js"></script>
    <script src="js/ads.js" defer></script>
</head>

<body>
    <!-- Шапка сайта -->
    <header>
        <div class="logo">
            <a href="index.html">Sweet Story</a>
        </div>
        <nav>
            <ul id="mobile-menu">
                <li><a href="index.html">Главная</a></li>
                <li><a href="about.html">О нас</a></li>
                <li><a href="contact.html">Контакты</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <div class="story">
                <div class="story-meta">
                    <span id="story-views" class="views">Просмотрено: </span>
                </div>
                <h1 id="story-title-main">Загружается...</h1>
                <div id="story-content">
                    <!-- Текст истории будет загружен сюда -->
                </div>

                <!-- Рекламный блок (шаблон) -->
                <div id="ad-block-template" style="display: none;">
                    <div style="margin: 20px 0; padding: 10px; background-color: #f7f7f7; border: 1px solid #ccc; border-radius: 8px;">
                        <h2 style="margin: 0;">Реклама</h2>
                        <p>Это ваш рекламный блок.</p>
                    </div>
                </div>
            </div>

            <!-- Подключение сайдбара -->
            <div class="sidebar">
                <h2>Также читают</h2>
                <ul>
                    <!-- Ссылки будут загружены здесь -->
                </ul>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content" style="text-align: center;">
            <p>&copy; 2025 Sweet Story. Все права защищены.</p>
            <nav>
                <ul style="display: inline-block; list-style: none; padding: 0; margin: 0;">
                    <li style="display: inline; margin-right: 15px;"><a href="privacy.html">Политика конфиденциальности</a></li>
                    <li style="display: inline;"><a href="terms.html">Условия использования</a></li>
                </ul>
            </nav>
        </div>
    </footer>

    <!-- Подключение скриптов -->
    <script src="js/storyLoader.js"></script> <!-- Загружает основную историю -->
    <script src="js/randomStory.js"></script> <!-- Загружает случайную историю -->

    <!-- Скрипт для автоматической вставки рекламы -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const storyContent = document.getElementById('story-content');
            const adBlockTemplate = document.getElementById('ad-block-template');

            // Проверяем, что история и шаблон рекламы существуют
            if (storyContent && adBlockTemplate) {
                const adBlock = adBlockTemplate.cloneNode(true);
                adBlock.id = ''; // Удаляем ID, чтобы не было дубликатов
                adBlock.style.display = 'block';

                // Загружаем динамический текст истории
                fetch('https://example.com/api/story') // Замените на ваш реальный API
                    .then(response => response.json())
                    .then(data => {
                        const storyText = data.content; // Ожидаем текст в поле "content"

                        // Делим текст пополам
                        const sentences = storyText.split('. ');
                        const middleIndex = Math.floor(sentences.length / 2);

                        const firstPart = sentences.slice(0, middleIndex).join('. ') + '.';
                        const secondPart = sentences.slice(middleIndex).join('. ');

                        // Вставляем текст с рекламным блоком
                        storyContent.innerHTML = `
                            <p>${firstPart}</p>
                        `;
                        storyContent.appendChild(adBlock);
                        storyContent.innerHTML += `
                            <p>${secondPart}</p>
                        `;
                    })
                    .catch(error => {
                        console.error('Ошибка загрузки истории:', error);
                        storyContent.innerHTML = '<p>Не удалось загрузить историю.</p>';
                    });
            }
        });
    </script>
</body>
</html>
