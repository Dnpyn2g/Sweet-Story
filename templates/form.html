<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить историю</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f7fc;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 2.5rem;
            margin-top: 40px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        form {
            display: grid;
            gap: 20px;
        }

        label {
            font-weight: bold;
            color: #555;
            font-size: 1.1rem;
        }

        input[type="text"], input[type="file"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            color: #333;
            box-sizing: border-box;
        }

        input[type="submit"] {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }

        .drop-zone {
            width: 100%;
            height: 180px;
            border: 2px dashed #007bff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 1.1rem;
            color: #007bff;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .drop-zone.hover {
            background-color: #f1f1f1;
        }

        #loading {
            display: none;
            font-size: 1.1rem;
            color: #007bff;
            text-align: center;
        }

        #success-message, #error-message {
            font-size: 1.1rem;
            text-align: center;
            margin-top: 10px;
        }

        #success-message {
            color: green;
        }

        #error-message {
            color: red;
        }

        #published-message {
            color: #4caf50;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            margin-top: 30px;
        }

        .form-footer {
            display: flex;
            justify-content: center;
        }

        .form-footer a {
            color: #007bff;
            text-decoration: none;
            font-size: 1rem;
            margin-top: 20px;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        #file-name {
            font-size: 1rem;
            color: #555;
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <h1>Добавьте новую историю</h1>
    <div class="container">
        <form id="story-form" action="/add_story" method="POST" enctype="multipart/form-data">
            <label for="title">Заголовок:</label>
            <input type="text" id="title" name="title" required><br>

            <label for="author">Автор:</label>
            <input type="text" id="author" name="author" required><br>

            <label for="views">Количество просмотров:</label>
            <input type="text" id="views" name="views" required><br>

            <label for="image_number">Номер картинки:</label>
            <input type="text" id="image_number" name="image_number" required><br>

            <label for="content">Текст истории (файл):</label>
            <div id="drop-zone" class="drop-zone">
                Перетащите файл с историей сюда
            </div>
            <input type="file" id="file-input" name="file" style="display: none;" accept=".txt"><br>
            <div id="file-name"></div>

            <label for="image">Изображение:</label>
            <input type="file" name="image" accept="image/*" required><br>

            <input type="submit" value="Добавить историю">
        </form>

        <div id="loading">Загрузка...</div>
        <div id="success-message"></div>
        <div id="error-message"></div>
        <div id="published-message"></div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const form = document.getElementById('story-form');
        const loading = document.getElementById('loading');
        const successMessage = document.getElementById('success-message');
        const errorMessage = document.getElementById('error-message');
        const publishedMessage = document.getElementById('published-message');

        dropZone.addEventListener('dragover', (event) => {
            event.preventDefault();
            dropZone.classList.add('hover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('hover');
        });

        dropZone.addEventListener('drop', (event) => {
            event.preventDefault();
            dropZone.classList.remove('hover');
            const file = event.dataTransfer.files[0];
            if (file && file.type === 'text/plain') {
                fileInput.files = event.dataTransfer.files;
                fileNameDisplay.textContent = `Выбран файл: ${file.name}`;
            } else {
                alert('Пожалуйста, перетащите файл с расширением .txt');
            }
        });

        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (file) {
                fileNameDisplay.textContent = `Выбран файл: ${file.name}`;
            }
        });

        form.addEventListener('submit', function(event) {
            event.preventDefault(); // Предотвращаем стандартное отправление формы

            const formData = new FormData(form);
            loading.style.display = 'inline'; // Показываем индикатор загрузки
            successMessage.innerHTML = '';  // Очищаем сообщения об успехе или ошибке
            errorMessage.innerHTML = '';
            publishedMessage.innerHTML = ''; // Очищаем сообщение о публикации

            // Отправляем данные через AJAX (fetch)
            fetch('/add_story', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none'; // Скрываем индикатор загрузки
                if (data.message) {
                    successMessage.innerHTML = data.message; // Показываем сообщение об успехе
                }
                publishedMessage.innerHTML = 'История успешно опубликована!'; // Показать сообщение о публикации
            })
            .catch(error => {
                loading.style.display = 'none'; // Скрываем индикатор загрузки
                errorMessage.innerHTML = 'Ошибка при загрузке: ' + error.message; // Показываем сообщение об ошибке
            });
        });
    </script>

</body>
</html>
